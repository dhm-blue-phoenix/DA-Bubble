<div (click)="setAktivDM(user.id)" class="justify-center flex items-center justify-items-start gap-2 cursor-pointer user_container" [class.aktiv]="user.id === aktiv_DM">
    <div class="relative size-[48px]">
        <img class="size-[48px]" [src]="user.avatar_url" alt="avatar">
        <div class="status " [class]="user.status"></div>
        
    </div>
    <span class="dm_user">{{user.name}}</span>
</div>
