<main class="flex gap-8 px-8 py-4 justify-between bg-sky-900" >

    <section class="channel flex-col bg-white flex items-center gap-8 p-4">
        <div class="flex justify-between w-full">
            <div class="flex items-center gap-4">
                <img class="size-60px" src="assets/svg/devspace/Workspace logo.svg" alt="workspace">
                <!-- Name Dynamisch and edeting -->
                <h2>Devspace</h2>
            </div>
            <button><img src="assets/svg/icons/icon_black/edit_square_black.svg" alt="edit"></button>
        </div>

        <div class="flex justify-between w-full items-center">
            <div class="flex gap-2 items-center">
                <button><img class="size-24px" src="assets/svg/icons/icon_black/arrow_drop_down_black.svg" alt="dropdown-arrow"></button>
                <div class="flex gap-2 items-center">
                    <img class="size-24px" src="assets/svg/icons/icon_black/workspaces_black.svg" alt="workspace">
                    <h3>Channels</h3>
                </div>
            </div>
            <button><img class="size-24px" src="assets/svg/icons/icon_black/add_black.svg" alt="workspace"></button>
        </div>

        <div class="w-full flex flex-col gap-8 p-6 overflow-y-auto max-h-48">
            <!-- Channel Name Dynmaisch , loop for manny channels  -->
            <div>
                <span class="single_channel aktiv_channel"># Entwicklerteam</span>
            </div>

            <div>
                <button class="flex gap-2 px-3 items-center">
                    <img class="size-24px" src="assets/svg/icons/icon_black/add_circle_black.svg" alt="add-channel">
                    <span>Channel hinzufügen</span>
                </button>
            </div>
        </div>

        <div class="flex w-full items-center gap-2 justify-start">
            <button><img class="size-24px" src="assets/svg/icons/icon_black/arrow_drop_down_black.svg" alt="dropdown-arrow"></button>
            <div class="flex gap-2 items-center">
                <img class="size-24px" src="assets/svg/icons/icon_black/account_circle_black.svg" alt="add-channel">
                <h3>Direktnachrichten</h3>
            </div>
        </div>

        <!-- Dm Loop for chat  -->
        <div class=" w-full flex items-start px-6 gap-4 flex-col overflow-y-auto flex-1">
            <div class="justify-center  flex items-center justify-items-start gap-2 ">
                <div class="relative size-[48px]">
                    <img class="size-[48px]" src="assets/svg/avatar/avatar_small/1.svg" alt="avatar">
                    <div class="status online"></div>
                    <!-- status online/offline? -->
                </div>
                <span class="dm_user">Elias Neumann</span>
            </div>

            <div class="justify-center  flex items-center justify-items-start gap-2 ">
                <div class="relative size-[48px]">
                    <img class="size-[48px]" src="assets/svg/avatar/avatar_small/1.svg" alt="avatar">
                    <div class="status offline"></div>
                    <!-- status online/offline? -->
                </div>
                <span class="dm_user">Elias Neumann</span>
            </div>

        </div>
    </section>

    <section class="chat bg-white flex-1">
        <div class="chat_header flex justify-between px-[42px] py-[24px] border-b-2 border-black/10 shadow-sm">
            <div class="flex items-center gap-2">
                <h2># Entwicklerteam</h2>
                <button><img class="size-24px" src="assets/svg/icons/icon_black/dropdown_black.svg" alt="dropdown-arrow"></button>
            </div>

            <!-- array of user -->
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div class="flex ">
                        <img class="size-[40px] -ml-3 border-2 rounded-full border-white" src="assets/svg/avatar/avatar_small/1.svg" alt="avatar">
                        <img class="size-[40px] -ml-3 border-2 rounded-full border-white"src="assets/svg/avatar/avatar_small/1.svg" alt="avatar">
                        <img class="size-[40px] -ml-3 border-2 rounded-full border-white" src="assets/svg/avatar/avatar_small/1.svg" alt="avatar">
                    </div>
                </div>
            <!-- index of array of user -->
                <div>
                    <span class="text-xl">3</span>
                </div>
                <button class="add_member size-[40px] rounded-full">
                    <img src="assets/svg/icons/icon_black/add_member_black.svg" alt="add_member">
                </button>
            </div>    
        </div>

        <div class="chat_container w-full p-[20px] flex flex-col ">

        <!-- chat history loop -->
            <div class="chat_history w-full flex-1 overflow-y-auto ">
                <div class="chat_history flex-1 bg-sky-900"></div>
            </div>

        <!-- chat input -->
            <div class="chat_input border-2 border-black/20 rounded-2xl flex flex-col p-4 gap-4">
                <input type="text" placeholder="Nachricht an # Entwicklerteam" class="outline-none w-full bg-transparent">
                <div class="flex justify-between items-center">
                    <div class="flex gap-3 items-center">
                        <button><img class="size-[20px]" src="assets/svg/icons/icon_grey/sentiment_satisfied_grey.svg" alt="emoji"></button>
                        <button><img class="size-[20px]" src="assets/svg/icons/icon_grey/alternate_email_grey.svg" alt="mention"></button>
                    </div>
                    <button class="rounded-full p-1">
                        <img class="size-[32px]" src="assets/svg/icons/icon_purple/Send icon.svg" alt="send">
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section class="thread bg-white"></section>
</main>
