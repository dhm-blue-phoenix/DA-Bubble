<div class="flex flex-col gap-[30px] items-center">
    <div class="flex items-center justify-between w-full">
        <a routerLink="/login">
            <img src="assets/svg/icons/icon_black/arrow_back_black.svg" alt="back_arrow">
        </a>
        <h2>Passwort zurücksetzen</h2>
    </div>

    <form class="flex justify-center items-center flex-col w-full gap-[30px]" action="">
        <div class="input_container flex items-center p-4 justify-between">
            <input #pwRef="ngModel" name="new_password" required [(ngModel)]="new_password" class="py-2" type="password" placeholder="Neues Passwort">
        </div>
        <div class="input_container flex items-center p-4 justify-between">
            <input #pwRepeatRef="ngModel" name="reapead_new_password" required [(ngModel)]="reapead_new_password" class="py-2" type="password" placeholder="Neues Passwort bestätigen">
        </div>
        <div class="errorContainer">
            @if (password_match === false) {
                <span class="errorMassage">Passwörter stimmen nicht über ein.</span>
            }
        </div>

        <div class="flex w-full justify-end">
            <button (click)="new_Password()" [disabled]="pwRef.invalid || pwRepeatRef.invalid" class="btn_raw text-white bg-[var(--btn)]" type="submit">Password zurücksetzen</button>
        </div>
    </form>

</div>
