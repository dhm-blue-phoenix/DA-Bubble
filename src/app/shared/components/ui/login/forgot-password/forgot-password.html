<div class="flex flex-col gap-[30px] items-center">
        <div class="flex items-center justify-between w-full">
        <a routerLink="/login">
            <img src="assets/svg/icons/icon_black/arrow_back_black.svg" alt="back_arrow">
        </a>
        <h2>Passwort zurücksetzen</h2>
    </div>
    <span class="text-xl text-center">Bitte geben Sie Ihre E-Mail-Adresse ein.</span>

    <form class="flex justify-center items-center flex-col w-full gap-[30px]" action="">
        <div class="input_container flex items-center p-4 justify-between">
            <img src="assets/svg/icons/icon_grey/mail_grey.svg" alt="mail-icon">
            <input #email="ngModel" name="email" [(ngModel)]="send_email" class="py-2" type="text" placeholder="beispielname@email.com" required>
        </div>
        <span class="text-center text-gray-500">Wir senden ihnen eine E-Mail über die Sie Ihr Passwort ändern können</span>
    
        <div class="flex w-full justify-end">
            <button (click)="sending_mail()" [disabled]="email.invalid" class="btn_raw text-white bg-[var(--btn)]" type="submit">
            E-Mail senden</button>
        </div>
    </form>
